<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>带薪成语研究院</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <div class="side-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">四字词语 · 汉字 Wordle</p>
            <h1>带薪成语研究院</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="重新开始" title="重新开始">
            ↻
          </button>
        </header>

        <section class="status-panel" aria-live="polite">
          <div>
            <span class="status-label">当前进度</span>
            <strong id="attemptStatus">0 / 10</strong>
          </div>
          <p id="message" class="message">输入一个四字词语开始。</p>
        </section>

        <form id="guessForm" class="guess-form" autocomplete="off">
          <label class="visually-hidden" for="guessInput">输入四字词语</label>
          <input
            id="guessInput"
            class="guess-input"
            name="guess"
            inputmode="text"
            placeholder="输入或粘贴词语"
            aria-describedby="message"
          />
          <button id="submitButton" class="primary-button" type="submit">提交</button>
        </form>

        <details class="rules">
          <summary>规则和颜色说明</summary>
          <div class="rule-content">
            <p>你有十次机会猜一个四字词语。每次提交后，系统会分别判断汉字、拼音、声母、韵母和声调。</p>
            <div class="legend" aria-label="颜色图例">
              <span><i class="swatch correct"></i>位置正确</span>
              <span><i class="swatch present"></i>答案中存在但位置不对</span>
              <span><i class="swatch absent"></i>不匹配</span>
            </div>
            <p>输入时不限制长度；提交时会自动读取前四个汉字，并自动显示每个字的拼音、声母、韵母和声调。</p>
          </div>
        </details>
      </div>

      <section class="play-panel" aria-label="猜词区域">
        <div id="board" class="board" aria-label="猜测记录"></div>
      </section>

      <aside class="achievement-panel" aria-label="已获得成就">
        <div class="achievement-panel-head">
          <span>已获得成就</span>
          <strong id="achievementCount">0</strong>
        </div>
        <div id="achievementList" class="achievement-list">
          <p class="empty-achievement">本次会话的称号会显示在这里。</p>
        </div>
      </aside>

      <footer class="site-credit">页面开发：酷炫青年@破阵子/Burnedgreen</footer>
    </main>

    <div id="resultDialog" class="dialog-backdrop" hidden>
      <section class="result-dialog" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
        <button id="closeResultButton" class="dialog-close" type="button" aria-label="关闭结果弹窗">×</button>
        <h2 id="resultTitle">猜中了</h2>

        <div class="result-summary">
          <span id="resultAttempts">0 / 10</span>
          <span id="resultSession">本次会话 0 胜 / 0 局</span>
        </div>

        <div id="meaningBlock" class="meaning-block">
          <p id="meaningText">释义待补充</p>
        </div>

        <div class="achievement-block">
          <span>本次获得成就</span>
          <div id="resultAchievementList" class="result-achievement-list"></div>
        </div>

        <div class="dialog-actions">
          <button id="playAgainButton" class="primary-button" type="button">再来一局</button>
        </div>
      </section>
    </div>

    <script src="./vendor/pinyin-pro.js"></script>
    <script src="./word-bank.js"></script>
    <script src="./idiom-contents.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
